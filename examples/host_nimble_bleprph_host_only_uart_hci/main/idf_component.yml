dependencies:
  nimble_peripheral_utils:
    path: ${IDF_PATH}/examples/bluetooth/nimble/common/nimble_peripheral_utils
  espressif/esp_wifi_remote:
    version: ">=1.3.1"
    rules:
      - if: "target in [esp32p4, esp32h2]"
      - if: "idf_version <6.1"
  espressif/esp_hosted:
    version: "*"
    rules:
      - if: "target in [esp32p4, esp32h2]"
